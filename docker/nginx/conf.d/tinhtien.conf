# ======================================================
# Redirect HTTP -> HTTPS
# ======================================================
server {
    listen 80;
    server_name thanhtoan.24hbilliardscoffee.com;
    return 301 https://$server_name$request_uri;
}

# ======================================================
# HTTPS SERVER (Chạy tạm thời - chưa có SSL thật)
# ======================================================
server {
    listen 443 ssl;
    server_name thanhtoan.24hbilliardscoffee.com;

    # ⚠️ Temporary self-signed SSL (hoặc comment lại nếu chưa có)
    #ssl_certificate     /etc/ssl/certs/ssl-cert-snakeoil.pem;
    #ssl_certificate_key /etc/ssl/private/ssl-cert-snakeoil.key;
    #ssl_protocols       TLSv1.2 TLSv1.3;
    #ssl_ciphers         HIGH:!aNULL:!MD5;

    # Ghi log (debug khi cần)
    access_log /var/log/nginx/thanhtoan.access.log;
    error_log  /var/log/nginx/thanhtoan.error.log;

    # ======================================================
    # FRONTEND (Next.js hoặc Vue)
    # ======================================================
    location / {
        proxy_pass http://frontend:3000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
        proxy_cache_bypass $http_upgrade;
    }

    # ======================================================
    # Static files của frontend (Next.js _next)
    # ======================================================
    location /_next/ {
        proxy_pass http://frontend:3000/_next/;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
        proxy_cache_bypass $http_upgrade;
    }

    # ======================================================
    # LARAVEL BACKEND API
    # ======================================================
    location /api {
        proxy_pass http://backend:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
    }

    # ======================================================
    # LARAVEL STORAGE (public)
    # ======================================================
    location /storage {
        alias /var/www/backend/storage/app/public;
        access_log off;
        log_not_found off;
        expires 1y;
        add_header Cache-Control "public, immutable";
        
        # CORS for file access
        add_header Access-Control-Allow-Origin *;
        add_header Access-Control-Allow-Methods "GET, OPTIONS";
        add_header Access-Control-Allow-Headers "Range";

        # Fix MIME type cho file Excel
        location ~* \.xlsx$ {
            add_header Content-Type "application/vnd.openxmlformats-officedocument.spreadsheetml.sheet";
        }
    }

    # ======================================================
    # LARAVEL Fallback (nếu cần truy cập trực tiếp)
    # ======================================================
    location /backend {
        root /var/www/backend/public;
        index index.php index.html;
        try_files $uri $uri/ /index.php?$query_string;
    }

    # ======================================================
    # PHP HANDLER (nếu có .php trong public)
    # ======================================================
    location ~ \.php$ {
        include fastcgi_params;
        fastcgi_pass 24h_billiard_backend:9000;
        fastcgi_index index.php;
        fastcgi_param SCRIPT_FILENAME /var/www/backend/public$fastcgi_script_name;
        fastcgi_param PATH_INFO $fastcgi_path_info;
    }
}
