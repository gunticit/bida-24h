# ======================================================
# API BACKEND SERVER - api.24hbilliardscoffee.com
# ======================================================

# Map to set CORS origin dynamically
map $http_origin $cors_origin {
    default "";
    "https://tinhtien.24hbilliardscoffee.com" $http_origin;
    "http://tinhtien.24hbilliardscoffee.com"  $http_origin;
    "https://24hbilliardscoffee.com"           $http_origin;
    "http://24hbilliardscoffee.com"            $http_origin;
    "http://localhost:3000"                     $http_origin;
    "http://localhost:3001"                     $http_origin;
}

server {
    listen 80;
    server_name api.24hbilliardscoffee.com;

    # Ghi log (debug khi cần)
    access_log /var/log/nginx/api.access.log;
    error_log  /var/log/nginx/api.error.log;

    # Root directory
    root /var/www/backend/public;
    index index.php index.html;

    # ======================================================
    # LARAVEL API Routes
    # ======================================================
    location / {
        # Handle CORS preflight (OPTIONS) requests
        if ($request_method = 'OPTIONS') {
            add_header 'Access-Control-Allow-Origin' $cors_origin always;
            add_header 'Access-Control-Allow-Methods' 'GET, POST, PUT, PATCH, DELETE, OPTIONS' always;
            add_header 'Access-Control-Allow-Headers' 'DNT,User-Agent,X-Requested-With,If-Modified-Since,Cache-Control,Content-Type,Range,Authorization,Accept,Origin' always;
            add_header 'Access-Control-Allow-Credentials' 'true' always;
            add_header 'Access-Control-Max-Age' 1728000;
            add_header 'Content-Type' 'text/plain; charset=utf-8';
            add_header 'Content-Length' 0;
            return 204;
        }

        try_files $uri $uri/ /index.php?$query_string;
    }

    # ======================================================
    # LARAVEL STORAGE (public)
    # ======================================================
    location /storage {
        alias /var/www/backend/storage/app/public;
        access_log off;
        log_not_found off;
        expires 1y;
        add_header Cache-Control "public, immutable";
        
        # CORS for file access
        add_header Access-Control-Allow-Origin *;
        add_header Access-Control-Allow-Methods "GET, OPTIONS";
        add_header Access-Control-Allow-Headers "Range";

        # Fix MIME type cho file Excel
        location ~* \.xlsx$ {
            add_header Content-Type "application/vnd.openxmlformats-officedocument.spreadsheetml.sheet";
        }
    }

    # ======================================================
    # PHP HANDLER via Proxy to Backend Container
    # ======================================================
    location ~ \.php$ {
        proxy_pass http://backend:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;

        # Add CORS headers to proxied responses
        add_header 'Access-Control-Allow-Origin' $cors_origin always;
        add_header 'Access-Control-Allow-Methods' 'GET, POST, PUT, PATCH, DELETE, OPTIONS' always;
        add_header 'Access-Control-Allow-Headers' 'DNT,User-Agent,X-Requested-With,If-Modified-Since,Cache-Control,Content-Type,Range,Authorization,Accept,Origin' always;
        add_header 'Access-Control-Allow-Credentials' 'true' always;
    }

    # ======================================================
    # Fallback - Proxy all to Laravel
    # ======================================================
    location @laravel {
        proxy_pass http://backend:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;

        # Add CORS headers to proxied responses
        add_header 'Access-Control-Allow-Origin' $cors_origin always;
        add_header 'Access-Control-Allow-Methods' 'GET, POST, PUT, PATCH, DELETE, OPTIONS' always;
        add_header 'Access-Control-Allow-Headers' 'DNT,User-Agent,X-Requested-With,If-Modified-Since,Cache-Control,Content-Type,Range,Authorization,Accept,Origin' always;
        add_header 'Access-Control-Allow-Credentials' 'true' always;
    }
}
