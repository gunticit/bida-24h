# ======================================================# ======================================================

# HTTP SERVER (Apache2 sẽ handle SSL)# HTTP SERVER (Apache2 sẽ handle SSL)

# ======================================================# ======================================================

server {server {

    listen 80;    listen 80;

    server_name thanhtoan.24hbilliardscoffee.com;    server_name thanhtoan.24hbilliardscoffee.com;



    # Ghi log (debug khi cần)    # Ghi log (debug khi cần)

    access_log /var/log/nginx/thanhtoan.access.log;    access_log /var/log/nginx/thanhtoan.access.log;

    error_log  /var/log/nginx/thanhtoan.error.log;    error_log  /var/log/nginx/thanhtoan.error.log;



    # ======================================================    # ======================================================

    # FRONTEND (Next.js hoặc Vue)    # FRONTEND (Next.js hoặc Vue)

    # ======================================================    # ======================================================

    location / {    location / {

        proxy_pass http://frontend:3000;        proxy_pass http://frontend:3000;

        proxy_http_version 1.1;        proxy_http_version 1.1;

        proxy_set_header Upgrade $http_upgrade;        proxy_set_header Upgrade $http_upgrade;

        proxy_set_header Connection "upgrade";        proxy_set_header Connection "upgrade";

        proxy_set_header Host $host;        proxy_set_header Host $host;

        proxy_set_header X-Real-IP $remote_addr;        proxy_set_header X-Real-IP $remote_addr;

        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;

        proxy_set_header X-Forwarded-Proto $scheme;        proxy_set_header X-Forwarded-Proto https;

        proxy_cache_bypass $http_upgrade;        proxy_cache_bypass $http_upgrade;

    }    }



    # ======================================================    # ======================================================

    # Static files của frontend (Next.js _next)    # Static files của frontend (Next.js _next)

    # ======================================================    # ======================================================

    location /_next/ {    location /_next/ {

        proxy_pass http://frontend:3000/_next/;        proxy_pass http://frontend:3000/_next/;

        proxy_http_version 1.1;        proxy_http_version 1.1;

        proxy_set_header Upgrade $http_upgrade;        proxy_set_header Upgrade $http_upgrade;

        proxy_set_header Connection "upgrade";        proxy_set_header Connection "upgrade";

        proxy_set_header Host $host;        proxy_set_header Host $host;

        proxy_set_header X-Real-IP $remote_addr;        proxy_set_header X-Real-IP $remote_addr;

        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;

        proxy_set_header X-Forwarded-Proto $scheme;        proxy_set_header X-Forwarded-Proto https;

        proxy_cache_bypass $http_upgrade;        proxy_cache_bypass $http_upgrade;

    }    }



    # ======================================================    # ======================================================

    # LARAVEL BACKEND API    # LARAVEL BACKEND API

    # ======================================================    # ======================================================

    location /api {    location /api {

        # Debug logging        proxy_pass http://backend:8000;

        access_log /var/log/nginx/api.access.log;        proxy_set_header Host $host;

                proxy_set_header X-Real-IP $remote_addr;

        proxy_pass http://backend:8000;        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;

        proxy_set_header Host $host;        proxy_set_header X-Forwarded-Proto https;

        proxy_set_header X-Real-IP $remote_addr;    }

        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;

        proxy_set_header X-Forwarded-Proto $scheme;    # ======================================================

        proxy_set_header X-Forwarded-Host $host;    # LARAVEL STORAGE (public)

            # ======================================================

        # Timeout settings    location /storage {

        proxy_connect_timeout 60s;        alias /var/www/backend/storage/app/public;

        proxy_send_timeout 60s;        access_log off;

        proxy_read_timeout 60s;        log_not_found off;

    }        expires 1y;

        add_header Cache-Control "public, immutable";

    # ======================================================        

    # LARAVEL STORAGE (public)        # CORS for file access

    # ======================================================        add_header Access-Control-Allow-Origin *;

    location /storage {        add_header Access-Control-Allow-Methods "GET, OPTIONS";

        alias /var/www/backend/storage/app/public;        add_header Access-Control-Allow-Headers "Range";

        access_log off;

        log_not_found off;        # Fix MIME type cho file Excel

        expires 1y;        location ~* \.xlsx$ {

        add_header Cache-Control "public, immutable";            add_header Content-Type "application/vnd.openxmlformats-officedocument.spreadsheetml.sheet";

                }

        # CORS for file access    }

        add_header Access-Control-Allow-Origin *;

        add_header Access-Control-Allow-Methods "GET, OPTIONS";    # ======================================================

        add_header Access-Control-Allow-Headers "Range";    # LARAVEL Fallback (nếu cần truy cập trực tiếp)

    # ======================================================

        # Fix MIME type cho file Excel    location /backend {

        location ~* \.xlsx$ {        root /var/www/backend/public;

            add_header Content-Type "application/vnd.openxmlformats-officedocument.spreadsheetml.sheet";        index index.php index.html;

        }        try_files $uri $uri/ /index.php?$query_string;

    }    }



    # ======================================================    # ======================================================

    # LARAVEL Fallback (nếu cần truy cập trực tiếp)    # PHP HANDLER (nếu có .php trong public)

    # ======================================================    # ======================================================

    location /backend {    #location ~ \.php$ {

        root /var/www/backend/public;        #include fastcgi_params;

        index index.php index.html;        #fastcgi_pass 24h_billiard_backend:9000;

        try_files $uri $uri/ /index.php?$query_string;        #fastcgi_index index.php;

    }        #fastcgi_param SCRIPT_FILENAME /var/www/backend/public$fastcgi_script_name;

        #fastcgi_param PATH_INFO $fastcgi_path_info;

    # ======================================================    #}

    # PHP HANDLER (nếu có .php trong public)}

    # ======================================================
    location ~ \.php$ {
        include fastcgi_params;
        fastcgi_pass 24h_billiard_backend:9000;
        fastcgi_index index.php;
        fastcgi_param SCRIPT_FILENAME /var/www/backend/public$fastcgi_script_name;
        fastcgi_param PATH_INFO $fastcgi_path_info;
    }
}